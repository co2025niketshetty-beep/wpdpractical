<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animal Gallery</title>
  <style>
    body {
	  font-family: Arial, sans-serif;
	  text-align: center;
	}
	.container {
	  background: #d1dff6;
	  display: flex;
	  flex-wrap: wrap;
	  gap: 32px;
	  justify-content: space-evenly;
	  align-items: stretch;
	  min-height: 100vh;
	  padding: 5vh 0 5vh;
	}
	.item {
	  background: #b2cbf2;
	  width: 100%;
	  max-width: 300px;
	  height: auto;
	  padding: 32px;
	  border-radius: 20px;
	  box-shadow: 0 2px 6px rgba(0, 0, 0, 1.0);
	}
	.item:hover {
	  background: #92b6f0;
	}
	img {
	  width: 100%;
	  aspect-ratio: 1 / 1;
	  object-fit: cover;
	  border-radius: 20px;
	}
	  
  </style>
 </head>
 <body>
  <h1>Animal Gallery</h1>
  <section class="container">
    <article class="item">
	  <h3>Dog</h3>
	  <img src="images/dog.jpg" alt="A dog sitting on its haunches.">
	  <p>The dog is a domesticated descendant of wolves.</p>
	</article>
	<article class="item">
	  <h3>Cat</h3>
	  <img src="images/cat.jpg" alt="A cat raising its paw in the air." title="Meow says hi!">
	  <p>The cat, also called domesticated cat or house cat, is a small carnivorous mammal.</p>
	</article>
	<article class="item">
	<h3>Rabbit</h3>
	<!-- CSS width, height properties override HTML height, width attributes -->
	<img src="images/rabbit.jpg" alt="A rabbit looking at the camera." title="Sniff, sniff!" width="250" height="250">
	<p>Rabbits, or bunnies, are small mammals in the family Leporidae, which is in the order Lagomorpha.</p>
  </section>
 </body>
 </html>
