<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Special Characters and their Use</title>
</head>
<body>
	<table>
		<tr>
			<th>Symbol</th>
			<th>Use</th>
		</tr>
		<tr>
			<td>&amp;</td>
			<td>Apples &amp; Oranges </td>
		</tr>
		<tr>
			<td>&lt;</td>
			<td>5 &lt; 10</td>
		</tr>
		<tr>
			<td>&gt;</td>
			<td>10 &gt; 20</td>
		</tr>
		<tr>
			<td>&quot;</td>
			<td>&quot;Hello CO-B!&quot;</td>
		</tr>
		<tr>
			<td>&copy;</td>
			<td>&copy;nks2026</td>
		</tr>
		<tr>
			<td>&trade;</td>
			<td>Pokemon&trade;</td> <!-- I missed the accent -->
		</tr>
		<tr>
			<td>&deg;</td>
			<td>It is 28&deg;C today.</td>
		</tr>
	</table>
</body>
</html>
