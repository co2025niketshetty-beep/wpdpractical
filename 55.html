<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Text Elements and Block elemnents</title>
</head>
<body>
	<!-- Block level elements - always start on a new line and
	take up full line width -->

	<!-- Text level elements - stay on the same line and 
	only take as much space a line as is needed -->

	<header>
		<h1>My Simple Webpage</h1>
	</header>

	<div>
		This is a block level element.
	</div>

	<p>
		This is also a block level element
		<span> which contains a span (inline) element</span>
		and a <b> bold (inline) </b> element
		and an <i> italic (inline) </i> element
	</p>

	<div>
		This is a block level element too with
		<a href="https://google.com">Google.com</a> (an inline element)
	</div>
</body>
</html>
